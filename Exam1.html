<!DOCTYPE html>
<html lang="es">
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Simulador CSWA — Examen 1</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Source+Sans+3:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Source Sans 3', sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
      padding: 40px 16px;
      color: #1a1a1a;
    }

    .quiz-shell { max-width: 1100px; margin: 0 auto; }

    .quiz-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }
    .quiz-title {
      font-family: 'Rajdhani', sans-serif;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #666;
    }
    .quiz-badge {
      font-family: 'Rajdhani', sans-serif;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.06em;
      background: #e8f0fb;
      color: #1a4d8c;
      padding: 4px 12px;
      border-radius: 6px;
      border: 1px solid rgba(26,77,140,0.2);
    }

    .progress-bar-wrap {
      width: 100%;
      height: 5px;
      background: #dde0e6;
      border-radius: 99px;
      margin-bottom: 6px;
      overflow: hidden;
    }
    .progress-bar-fill {
      height: 100%;
      background: #0070c0;
      border-radius: 99px;
      transition: width 0.4s ease;
    }
    .progress-label {
      font-size: 12px;
      color: #888;
      text-align: right;
      margin-bottom: 16px;
    }

    .question-card {
      background: #fff;
      border: 1px solid #dde0e6;
      border-radius: 14px;
      overflow: hidden;
      box-shadow: 0 2px 12px rgba(0,0,0,0.07);
    }

    .q-category {
      background: #1a4d8c;
      padding: 9px 20px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .q-cat-id {
      font-family: 'Rajdhani', sans-serif;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.1em;
      color: rgba(255,255,255,0.65);
    }
    .q-cat-dot { width: 3px; height: 3px; border-radius: 50%; background: rgba(255,255,255,0.35); flex-shrink: 0; }
    .q-cat-name {
      font-family: 'Rajdhani', sans-serif;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.09em;
      text-transform: uppercase;
      color: #fff;
    }

    .q-image-wrap {
      background: #f4f5f8;
      border-bottom: 1px solid #dde0e6;
      padding: 24px 20px;
      text-align: center;
      cursor: zoom-in;
      position: relative;
      min-height: 180px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .q-image-wrap img {
      max-width: 100%;
      max-height: 280px;
      object-fit: contain;
      border-radius: 4px;
      transition: opacity 0.15s;
    }
    .q-image-wrap:hover img { opacity: 0.88; }
    .zoom-hint {
      position: absolute;
      bottom: 8px;
      right: 14px;
      font-size: 11px;
      color: #999;
      display: flex;
      align-items: center;
      gap: 4px;
      pointer-events: none;
    }

    .q-thumbs {
      background: #555;
      border-bottom: 1px solid #dde0e6;
      padding: 10px;
      display: flex;
      justify-content: center;
      gap: 8px;
      flex-wrap: wrap;
    }
    .q-thumbs.hidden { display: none; }
    .q-thumb {
      width: 64px;
      height: 52px;
      object-fit: cover;
      border-radius: 4px;
      cursor: pointer;
      border: 2px solid transparent;
      opacity: 0.65;
      transition: all 0.15s;
      background: #fff;
    }
    .q-thumb:hover { opacity: 1; }
    .q-thumb.active { border-color: #f5a623; opacity: 1; }

    .q-body { padding: 20px 22px 24px; }
    .q-num {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: #888;
      margin-bottom: 8px;
    }
    .q-text {
      font-size: 15.5px;
      line-height: 1.65;
      color: #1a1a1a;
      margin-bottom: 22px;
    }

    .options-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    @media (max-width: 480px) { .options-grid { grid-template-columns: 1fr; } }

    .opt-btn {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 13px 16px;
      background: #f6f7fa;
      border: 1.5px solid #dde0e6;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.15s;
      font-size: 14px;
      font-weight: 500;
      color: #1a1a1a;
      text-align: left;
      width: 100%;
      font-family: 'Source Sans 3', sans-serif;
    }
    .opt-btn:hover { background: #fff; border-color: #0070c0; color: #0070c0; }
    .opt-btn.selected { background: #e8f0fb; border-color: #0070c0; color: #0070c0; }

    .opt-letter {
      width: 27px;
      height: 27px;
      border-radius: 50%;
      background: #fff;
      border: 1.5px solid #ccc;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Rajdhani', sans-serif;
      font-size: 13px;
      font-weight: 700;
      flex-shrink: 0;
      transition: all 0.15s;
    }
    .opt-btn.selected .opt-letter { background: #0070c0; border-color: #0070c0; color: #fff; }

    .q-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 22px;
      border-top: 1px solid #eaecf0;
    }

    .btn-nav {
      font-family: 'Source Sans 3', sans-serif;
      font-size: 13px;
      font-weight: 500;
      padding: 8px 16px;
      background: transparent;
      color: #555;
      border: 1px solid #ccc;
      border-radius: 7px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: all 0.15s;
    }
    .btn-nav:hover:not(:disabled) { background: #f4f5f8; border-color: #aaa; }
    .btn-nav:disabled { opacity: 0.35; cursor: default; }

    .saved-indicator {
      font-size: 12px;
      color: #1a7a3c;
      display: flex;
      align-items: center;
      gap: 5px;
      opacity: 0;
      transition: opacity 0.3s;
    }
    .saved-indicator.show { opacity: 1; }

    .lightbox {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.88);
      z-index: 9999;
      align-items: center;
      justify-content: center;
      cursor: zoom-out;
    }
    .lightbox.open { display: flex; }
    .lightbox img {
      max-width: 92vw;
      max-height: 88vh;
      object-fit: contain;
      border-radius: 8px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.5);
      cursor: default;
    }
    .lb-close {
      position: fixed;
      top: 18px;
      right: 24px;
      color: #fff;
      font-size: 32px;
      cursor: pointer;
      opacity: 0.75;
      background: none;
      border: none;
      transition: opacity 0.15s;
    }
    .lb-close:hover { opacity: 1; }
  </style>
</head>

<div class="quiz-shell">

  <div class="quiz-header">

  <div class="question-card">
    <div class="q-category">

      <span class="q-cat-dot"></span>
      <span class="q-cat-name" id="catName"></span>
    </div>

      <span class="zoom-hint"><i class="ti ti-zoom-in"></i> Clic para ampliar</span>
    </div>

    <div class="q-thumbs hidden" id="thumbsRow"></div>

    <div class="q-body">
      <div class="q-num" id="qNum"></div>
      <div class="q-text" id="qText"></div>
      <div class="options-grid" id="optionsGrid"></div>
    </div>

    <div class="q-footer">
      <button class="btn-nav" id="btnPrev" onclick="navigate(-1)">
        <i class="ti ti-arrow-left"></i> Anterior
      </button>
      <span class="saved-indicator" id="savedIndicator">
        <i class="ti ti-check"></i> Guardado
      </span>
      <button class="btn-nav" id="btnNext" onclick="navigate(1)">
        Siguiente <i class="ti ti-arrow-right"></i>
      </button>
    </div>
  </div>

</div>

<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <button class="lb-close" onclick="closeLightbox()">✕</button>
  <img id="lightboxImg" src="" alt="Vista ampliada" onclick="event.stopPropagation()" />
</div>

  /* ── Helpers de estado ── */
  function getIntentos()  { return parseInt(localStorage.getItem('cswa_examen1_intentos') || '0', 10); }
  function yaAprobado()   { return localStorage.getItem('cswa_examen1_aprobado')   === 'true'; }
  function yaFinalizado() { return localStorage.getItem('cswa_examen1_finalizado') === 'true'; }
  function yaAgotado()    { return getIntentos() >= MAX_INTENTOS && !yaAprobado(); }

  function normalize(str) {
    return (str || '').toString().trim().toLowerCase().replace(/\s+/g, ' ');
  }

  /* ── Calcular resultados (solo conteos, sin HTML) ── */
  function calcularResultados() {
    var correctCount = 0, incorrectCount = 0, pendingCount = 0;

    PREGUNTAS_RESULTADOS.forEach(function(p) {
      var estado = 'pending';

      if (p.tipo === 'xyz') {
        var x = localStorage.getItem(p.keys[0]) || '';
        var y = localStorage.getItem(p.keys[1]) || '';
        var z = localStorage.getItem(p.keys[2]) || '';
        if (x || y || z) {
          var cp = p.correcta.split('/').map(function(s){ return parseFloat(s.trim()); });
          var rp = [parseFloat(x), parseFloat(y), parseFloat(z)];
          estado = cp.every(function(cv, i){ return !isNaN(rp[i]) && Math.abs(rp[i]-cv)/Math.abs(cv) <= 0.01; })
            ? 'correct' : 'incorrect';
        }
      } else {
        var respuesta = localStorage.getItem(p.key) || '';
        if (respuesta) {
          var rv = parseFloat(respuesta), cv = parseFloat(p.correcta);
          estado = (!isNaN(rv) && !isNaN(cv))
            ? (Math.abs(rv-cv)/Math.abs(cv) <= 0.01 ? 'correct' : 'incorrect')
            : (normalize(respuesta) === normalize(p.correcta) ? 'correct' : 'incorrect');
        }
      }

      if (estado === 'correct') correctCount++;
      else if (estado === 'incorrect') incorrectCount++;
      else pendingCount++;
    });

    return { correctCount: correctCount, incorrectCount: incorrectCount, pendingCount: pendingCount };
  }

  /* ── Mostrar pantalla de resultados ── */
  function mostrarResultados(data) {
    var correctCount   = data.correctCount;
    var incorrectCount = data.incorrectCount;

    var pct      = Math.round((correctCount / 13) * 100);

    var intentos = getIntentos();

    /* Generar filas conociendo ya si aprobó o no */
    var filas = '';
    PREGUNTAS_RESULTADOS.forEach(function(p) {

      if (p.tipo === 'xyz') {

        if (!x && !y && !z) {
          respuesta = '—';

          respuesta = x + ' / ' + y + ' / ' + z;
          var cp = p.correcta.split('/').map(function(s){ return parseFloat(s.trim()); });
          var rp = [parseFloat(x), parseFloat(y), parseFloat(z)];
          estado = cp.every(function(cv, i){ return !isNaN(rp[i]) && Math.abs(rp[i]-cv)/Math.abs(cv) <= 0.01; })
            ? 'correct' : 'incorrect';
        }
      } else {
        respuesta = localStorage.getItem(p.key) || '';
        if (!respuesta) {
          respuesta = '—';
        } else {
          var rv = parseFloat(respuesta), cv = parseFloat(p.correcta);
          estado = (!isNaN(rv) && !isNaN(cv))
            ? (Math.abs(rv-cv)/Math.abs(cv) <= 0.01 ? 'correct' : 'incorrect')
            : (normalize(respuesta) === normalize(p.correcta) ? 'correct' : 'incorrect');

      var col  = estado === 'correct' ? '#1b5e20' : estado === 'incorrect' ? '#b71c1c' : '#856404';
      var text = estado === 'correct' ? '✓ Correcto' : estado === 'incorrect' ? '✗ Incorrecto' : '— Sin responder';

      /* Solo mostrar la respuesta correcta si aprobó O si esa pregunta la acertó */
      var celdaCorrecta = (aprobado || estado === 'correct')
        ? p.correcta
        : '<span style="color:#bbb;font-style:italic;font-size:12px;">—</span>';

      filas +=

    var headerText  = aprobado
      ? '✓ ' + correctCount + ' de 13 correctas — ¡Aprobado!'
      : '✗ ' + correctCount + ' de 13 correctas — No aprobado' + (pendingCount > 0 ? ' (' + pendingCount + ' sin contestar)' : '');

    var zonaReintentos = '';

      if (intentosRestantes > 0) {

            '<div style="font-size:13px;color:#856404;margin-bottom:12px;">Intento ' + intentos + ' de ' + MAX_INTENTOS + ' — Te ' +
              (intentosRestantes === 1 ? 'queda <strong>1 intento</strong>' : 'quedan <strong>' + intentosRestantes + ' intentos</strong>') +

          '</div>';
      } else {

          '<div style="margin-top:16px;padding:16px;background:#333;color:#fff;border-radius:10px;text-align:center;font-size:14px;font-weight:600;">' +
            '❌ Has agotado los ' + MAX_INTENTOS + ' intentos permitidos.' +
          '</div>';

    }

    var html =
      '<div style="font-family:\'Source Sans 3\',sans-serif;">' +
        '<div style="background:' + headerColor + ';padding:16px 24px;border-radius:10px 10px 0 0;display:flex;align-items:center;justify-content:space-between;">' +

          '<div style="text-align:center;padding:16px;border-right:1px solid #dde0e6;"><div style="font-size:28px;font-weight:700;color:#2e7d32;">' + correctCount + '</div><div style="font-size:11px;color:#666;text-transform:uppercase;letter-spacing:.04em;">Correctas</div></div>' +

          '<div style="height:12px;background:#dde0e6;border-radius:9px;overflow:hidden;">' +

          '</div>' +

  /* ── Finalizar examen ── */
  function finalizarExamen() {
    if (yaAgotado()) return;
    if (yaAprobado()) return;
    if (!confirm('¿Estás seguro de que deseas finalizar el examen? Esta acción calculará tu calificación.')) return;

    var data = calcularResultados();

    var intentos = getIntentos() + 1;
    localStorage.setItem('cswa_examen1_intentos',  intentos.toString());
    localStorage.setItem('cswa_examen1_finalizado', 'true');

    var aprobado = data.correctCount >= 9 && data.pendingCount === 0;
    if (aprobado) localStorage.setItem('cswa_examen1_aprobado', 'true');

    localStorage.setItem('cswa_examen1_snapshot', JSON.stringify(data));

    mostrarResultados(data);
  }

  /* ── Reiniciar examen ── */
  function reiniciarExamen() {
    if (yaAgotado()) return;
    if (!confirm('¿Deseas reintentar el examen? Tus respuestas actuales se borrarán.')) return;

    for (var i = 1; i <= 13; i++) {
      localStorage.removeItem('cswa_examen1_p' + i + '_valor');
      localStorage.removeItem('cswa_examen1_p' + i + '_index');
      localStorage.removeItem('cswa_examen1_p' + i + '_input');
      localStorage.removeItem('cswa_examen1_p' + i + '_x');
      localStorage.removeItem('cswa_examen1_p' + i + '_y');
      localStorage.removeItem('cswa_examen1_p' + i + '_z');
    }
    localStorage.removeItem('cswa_examen1_finalizado');
    localStorage.removeItem('cswa_examen1_snapshot');

    current = 0;
    document.querySelector('.quiz-shell').innerHTML = originalHTML;
    renderQuestion(0);
  }

  /* ── Renderizar pregunta ── */
  function renderQuestion(idx) {
    var q = preguntas[idx];
    var n = idx + 1;

    document.getElementById('badge').textContent         = 'Pregunta ' + n + ' de ' + TOTAL;
    document.getElementById('progressFill').style.width  = (n / TOTAL * 100) + '%';
    document.getElementById('progressLabel').textContent = n + ' de ' + TOTAL + ' preguntas';
    document.getElementById('catId').textContent         = q.categoriaId;
    document.getElementById('catName').textContent       = q.categoriaNombre;

    var mainImg   = document.getElementById('qImg');
    var thumbsRow = document.getElementById('thumbsRow');
    mainImg.style.display = '';

    if (q.imagenes && q.imagenes.length > 1) {
      currentImgUrl = q.imagenes[0];
      mainImg.src   = currentImgUrl;
      thumbsRow.classList.remove('hidden');
      thumbsRow.innerHTML = '';
      q.imagenes.forEach(function(url, i) {
        var t = document.createElement('img');
        t.className = 'q-thumb' + (i === 0 ? ' active' : '');
        t.src = url;
        t.onclick = (function(u, el) {
          return function() { setThumb(u, el); };
        })(url, t);
        thumbsRow.appendChild(t);
      });
    } else {
      currentImgUrl = q.imagen;
      mainImg.src   = currentImgUrl;
      thumbsRow.classList.add('hidden');
      thumbsRow.innerHTML = '';
    }
    document.getElementById('lightboxImg').src = currentImgUrl;

    document.getElementById('qNum').textContent = 'Pregunta ' + n;
    document.getElementById('qText').innerHTML  = q.texto;

    var oldAttach = document.getElementById('questionAttachment');
    if (oldAttach) oldAttach.remove();
    if (q.adjunto) {
      var attach = document.createElement('div');
      attach.id = 'questionAttachment';
      attach.style.cssText = 'margin-bottom:20px;padding:14px;background:#f4f6f9;border:1px solid #dde0e6;border-radius:8px;';
      attach.innerHTML =
        '<div style="font-size:11px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:#666;margin-bottom:10px;">Archivo adjunto</div>' +
        '<a href="' + q.adjunto.url + '" target="_blank" style="display:inline-flex;align-items:center;gap:8px;padding:10px 14px;background:#fff;border:1.5px solid #0070c0;border-radius:7px;color:#0070c0;text-decoration:none;font-size:14px;font-weight:600;">📎 ' + q.adjunto.texto + '</a>';
      document.getElementById('qText').after(attach);
    }

    var grid = document.getElementById('optionsGrid');
    grid.innerHTML = '';

    if (q.tipo === 'input') {
      var storageKey = 'cswa_examen1_p' + n + '_input';
      var savedVal   = localStorage.getItem(storageKey) || '';
      grid.innerHTML =
        '<div style="grid-column:1/-1;padding:8px 0;">' +
          '<label style="display:block;font-size:14px;font-weight:600;margin-bottom:8px;color:#444;">Introduzca el valor (g):</label>' +
          '<input type="text" id="massInput" placeholder="' + (q.placeholder || '') + '" value="' + savedVal + '" style="width:100%;padding:12px 14px;border:1.5px solid #ccd2da;border-radius:8px;font-size:15px;font-family:inherit;">' +
          '<div style="margin-top:7px;font-size:12px;color:#888;">Use . (punto) como separador decimal</div>' +
        '</div>';
      document.getElementById('massInput').addEventListener('input', function() {
        localStorage.setItem(storageKey, this.value);
        showSaved();
      });

    } else if (q.tipo === 'input_xyz') {
      var sx = localStorage.getItem('cswa_examen1_p' + n + '_x') || '';
      var sy = localStorage.getItem('cswa_examen1_p' + n + '_y') || '';
      var sz = localStorage.getItem('cswa_examen1_p' + n + '_z') || '';
      grid.innerHTML =
        '<div style="grid-column:1/-1;padding:8px 0;">' +
          '<label style="display:block;font-size:14px;font-weight:600;margin-bottom:12px;color:#444;">Introduzca las coordenadas (mm):</label>' +
          '<div style="display:flex;flex-direction:column;gap:10px;">' +
            '<div style="display:flex;align-items:center;gap:12px;"><span style="width:20px;font-weight:700;color:#555;">X:</span><input id="inputX" type="text" value="' + sx + '" placeholder="0.00" style="padding:10px 12px;border:1.5px solid #ccd2da;border-radius:8px;font-size:15px;font-family:inherit;width:180px;"></div>' +
            '<div style="display:flex;align-items:center;gap:12px;"><span style="width:20px;font-weight:700;color:#555;">Y:</span><input id="inputY" type="text" value="' + sy + '" placeholder="0.00" style="padding:10px 12px;border:1.5px solid #ccd2da;border-radius:8px;font-size:15px;font-family:inherit;width:180px;"></div>' +
            '<div style="display:flex;align-items:center;gap:12px;"><span style="width:20px;font-weight:700;color:#555;">Z:</span><input id="inputZ" type="text" value="' + sz + '" placeholder="0.00" style="padding:10px 12px;border:1.5px solid #ccd2da;border-radius:8px;font-size:15px;font-family:inherit;width:180px;"></div>' +
          '</div>' +
          '<div style="margin-top:8px;font-size:12px;color:#888;">Use . (punto) como separador decimal</div>' +
        '</div>';
      function saveXYZ() {
        localStorage.setItem('cswa_examen1_p' + n + '_x', document.getElementById('inputX').value);
        localStorage.setItem('cswa_examen1_p' + n + '_y', document.getElementById('inputY').value);
        localStorage.setItem('cswa_examen1_p' + n + '_z', document.getElementById('inputZ').value);
        showSaved();
      }
      document.getElementById('inputX').addEventListener('input', saveXYZ);
      document.getElementById('inputY').addEventListener('input', saveXYZ);
      document.getElementById('inputZ').addEventListener('input', saveXYZ);

    } else {
      var letras     = ['A', 'B', 'C', 'D'];
      var storageKey = 'cswa_examen1_p' + n + '_valor';
      var savedVal   = localStorage.getItem(storageKey);
      q.opciones.forEach(function(opcion, i) {
        var btn = document.createElement('button');
        btn.className     = 'opt-btn' + (savedVal === opcion ? ' selected' : '');
        btn.dataset.valor = opcion;
        btn.dataset.index = i + 1;
        btn.innerHTML     = '<span class="opt-letter">' + letras[i] + '</span> ' + opcion;
        btn.onclick       = function() { selectOpt(this, n); };
        grid.appendChild(btn);
      });
    }

    document.getElementById('btnPrev').disabled = (idx === 0);
    var btnNext = document.getElementById('btnNext');

    if (idx === preguntas.length - 1) {
      if (yaAprobado() || yaAgotado()) {
        btnNext.style.display = 'none';
      } else {
        btnNext.style.display = '';
        btnNext.innerHTML = 'Finalizar examen <i class="ti ti-flag"></i>';
        btnNext.onclick   = function() { finalizarExamen(); };
      }
    } else {
      btnNext.style.display = '';
      btnNext.innerHTML = 'Siguiente <i class="ti ti-arrow-right"></i>';
      btnNext.onclick   = function() { navigate(1); };
    }

    document.getElementById('savedIndicator').classList.remove('show');
  }

  /* ── Helpers UI ── */
  function showSaved() {
    var ind = document.getElementById('savedIndicator');
    ind.classList.add('show');
    setTimeout(function() { ind.classList.remove('show'); }, 1800);
  }

  function setThumb(url, el) {
    currentImgUrl = url;
    document.getElementById('qImg').src       = url;
    document.getElementById('lightboxImg').src = url;
    document.querySelectorAll('.q-thumb').forEach(function(t) { t.classList.remove('active'); });
    el.classList.add('active');
  }

  function selectOpt(el, numPregunta) {
    document.querySelectorAll('.opt-btn').forEach(function(b) { b.classList.remove('selected'); });
    el.classList.add('selected');
    localStorage.setItem('cswa_examen1_p' + numPregunta + '_index', el.dataset.index);
    localStorage.setItem('cswa_examen1_p' + numPregunta + '_valor', el.dataset.valor);
    showSaved();
  }

  function navigate(dir) {
    var next = current + dir;
    if (next < 0 || next >= preguntas.length) return;
    current = next;
    renderQuestion(current);
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  function openLightbox() {
    document.getElementById('lightboxImg').src = currentImgUrl;
    document.getElementById('lightbox').classList.add('open');
    document.body.style.overflow = 'hidden';
  }
  function closeLightbox() {
    document.getElementById('lightbox').classList.remove('open');
    document.body.style.overflow = '';
  }
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape')     closeLightbox();
    if (e.key === 'ArrowRight') navigate(1);
    if (e.key === 'ArrowLeft')  navigate(-1);
  });

  /* =============================================
     INICIO — lógica de estado al cargar
  ============================================= */
  if (yaAgotado()) {
    document.querySelector('.quiz-shell').innerHTML =
      '<div style="background:#333;color:#fff;border-radius:10px;padding:32px;text-align:center;font-size:15px;font-weight:600;">' +
        '❌ Has agotado los ' + MAX_INTENTOS + ' intentos permitidos para este examen.' +
      '</div>';

  } else if (yaFinalizado()) {
    var snap = localStorage.getItem('cswa_examen1_snapshot');
    if (snap) {
      mostrarResultados(JSON.parse(snap));
    }

  } else {
     originalHTML = document.querySelector('.quiz-shell').innerHTML;
    renderQuestion(0);
  }
</script>

</body>
</html>
