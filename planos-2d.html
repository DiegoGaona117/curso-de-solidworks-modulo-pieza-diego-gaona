    { id:153, title:"Girar vista del dibujo",             dur:"0:53",  section:"Fabricación Manual de planos 2D", type:"video", videoUrl:"https://drive.google.com/file/d/1osQpLFu7luZkYtxN25ggKetTIenFzOty/preview?usp=drive_link", pdfUrl:null },
    { id:154, title:"Servomotor MG995 — Generar plano en 2D", dur:"9:08", section:"Fabricación Manual de planos 2D", type:"video", videoUrl:"https://drive.google.com/file/d/1DfZFwkS0xpQcJ7CexeE_V9t-eGd1PCkf/preview?usp=drive_link", pdfUrl:null },
    // ── FINAL ────────────────────────────────────────────────
    { id:128, title:"¡Curso completado!", dur:"—", section:"Conclusión", type:"congrats" }
];

// ── STATE ───────────────────────────────────────────────────
let currentIdx = 0;
let completed = new Set();

function loadState() {
    try {
        const i = localStorage.getItem('planos_idx');
        const c = localStorage.getItem('planos_done');
        if (i) currentIdx = Math.min(parseInt(i), lessons.length - 1);
        if (c) completed = new Set(JSON.parse(c));
    } catch {}
}

function saveState() {
    try {
        localStorage.setItem('planos_idx', currentIdx);
        localStorage.setItem('planos_done', JSON.stringify([...completed]));
    } catch {}
}

function getLessonFromURL() {
    const id = new URLSearchParams(location.search).get('l');
    if (id !== null) {
        const idx = lessons.findIndex(l => l.id === parseInt(id));
        if (idx !== -1) return idx;
    }
    return null;
}

function pushURL(idx) {
    history.pushState({ idx }, '', `?l=${lessons[idx].id}`);
}

// ── YOUTUBE ─────────────────────────────────────────────────
function ytEmbed(url) {
    if (!url) return null;
    let id = null;
    if (url.includes('watch?v=')) id = url.split('watch?v=')[1].split('&')[0];
    else if (url.includes('youtu.be/')) id = url.split('youtu.be/')[1].split('?')[0];
    return id ? `https://www.youtube.com/embed/${id}?rel=0&modestbranding=1` : null;
}

// ── PROGRESS ────────────────────────────────────────────────
function updateProgress() {
    const pct = Math.round((completed.size / lessons.length) * 100);
    document.getElementById('progressFill').style.width = pct + '%';
    document.getElementById('progressText').textContent = pct + '%';
}

// ── SIDEBAR ─────────────────────────────────────────────────
function renderSidebar() {
    const el = document.getElementById('sidebarScroll');
    el.innerHTML = '';
    let section = '';

    lessons.forEach((l, idx) => {
        if (l.section !== section) {
            section = l.section;
            const lbl = document.createElement('div');
            lbl.className = 'section-label';
            lbl.textContent = section;
            el.appendChild(lbl);
        }

        const item = document.createElement('div');
        item.className = 'lesson-item' + (idx === currentIdx ? ' active' : '');

        const check = document.createElement('div');
        check.className = 'lesson-check' + (completed.has(idx) ? ' done' : '');
        check.addEventListener('click', e => { e.stopPropagation(); toggleDone(idx); });

        const meta = document.createElement('div');
        meta.className = 'lesson-meta';
        meta.innerHTML = `<div class="lesson-name">${l.title}</div><div class="lesson-dur">${l.dur}</div>`;

        item.appendChild(check);
        item.appendChild(meta);

        if (l.type === 'pdf') {
            const badge = document.createElement('span');
            badge.className = 'lesson-type-badge badge-pdf';
            badge.textContent = 'PDF';
            item.appendChild(badge);
        }

        item.addEventListener('click', () => { navigate(idx); closeSidebar(); });
        el.appendChild(item);
    });

    // scroll active into view
    const active = el.querySelector('.lesson-item.active');
    if (active) active.scrollIntoView({ block: 'nearest' });
}

// ── CONTENT ─────────────────────────────────────────────────
function renderContent() {
    const el = document.getElementById('contentInner');
    const l = lessons[currentIdx];

    document.getElementById('btnPrev').disabled = currentIdx === 0;

    if (l.type === 'congrats') {
    const total = lessons.length - 1; // sin contar la lección congrats
    const done = completed.size;
    const pct = Math.round((done / total) * 100);
    const remaining = total - done;
    const isComplete = pct >= 100;

    if (isComplete) {
        el.innerHTML = `
            <div class="congrats-wrap">
                <span class="congrats-emoji">🎓</span>
                <h1 class="congrats-title">¡Curso completado!</h1>
                <p class="congrats-sub">Has terminado todo el contenido. Ahora tienes las bases sólidas para diseñar en SolidWorks de forma profesional. ¡Excelente trabajo!</p>
                <div class="section-divider" style="max-width:200px;margin:32px auto;"></div>
                <p style="font-size:14px;color:var(--text-muted);">— Diego Gaona</p>
            </div>`;
    } else {
        el.innerHTML = `
            <div style="max-width:560px; margin:0 auto; padding:20px 0;">

                <h1 class="lesson-title-main" style="margin-bottom:6px;">Tu progreso</h1>
                <p style="font-size:14px; color:var(--text-dim); margin-bottom:32px;">
                    Completa todas las lecciones para desbloquear esta pantalla.
                </p>

                <!-- Porcentaje grande -->
                <div style="text-align:center; margin-bottom:28px;">
                    <span style="font-size:72px; font-weight:600; letter-spacing:-0.04em; color:var(--text);">${pct}<span style="font-size:36px; color:var(--text-dim);">%</span></span>
                    <p style="font-size:13px; color:var(--text-dim); margin-top:4px;">completado</p>
                </div>

                <!-- Barra de progreso -->
                <div style="height:8px; background:var(--surface2); border-radius:99px; overflow:hidden; margin-bottom:32px;">
                    <div style="height:100%; width:${pct}%; background:var(--orange); border-radius:99px; transition:width 0.6s ease;"></div>
                </div>

                <!-- Stats -->
                <div style="display:grid; grid-template-columns:1fr 1fr 1fr; gap:12px; margin-bottom:36px;">
                    <div style="background:var(--surface); border:1px solid var(--border2); border-radius:10px; padding:16px; text-align:center;">
                        <div style="font-size:22px; font-weight:600; color:var(--green); margin-bottom:4px;">${done}</div>
                        <div style="font-size:11px; color:var(--text-dim); text-transform:uppercase; letter-spacing:0.06em;">Completadas</div>
                    </div>
                    <div style="background:var(--surface); border:1px solid var(--border2); border-radius:10px; padding:16px; text-align:center;">
                        <div style="font-size:22px; font-weight:600; color:var(--orange); margin-bottom:4px;">${remaining}</div>
                        <div style="font-size:11px; color:var(--text-dim); text-transform:uppercase; letter-spacing:0.06em;">Pendientes</div>
                    </div>
                    <div style="background:var(--surface); border:1px solid var(--border2); border-radius:10px; padding:16px; text-align:center;">
                        <div style="font-size:22px; font-weight:600; color:var(--text); margin-bottom:4px;">${total}</div>
                        <div style="font-size:11px; color:var(--text-dim); text-transform:uppercase; letter-spacing:0.06em;">Total</div>
                    </div>
                </div>

                <!-- Mensaje motivacional -->
                <div style="background:var(--surface); border:1px solid var(--border); border-left:3px solid var(--orange); border-radius:8px; padding:16px 20px;">
                    <p style="font-size:13px; color:var(--text-dim); line-height:1.7; margin:0;">
                        ${pct < 25  ? '¡Buen comienzo! Sigue avanzando lección por lección.' :
                          pct < 50  ? '¡Ya vas por la primera mitad! Mantén el ritmo.' :
                          pct < 75  ? '¡Más de la mitad completado! Ya casi llegas.' :
                                      '¡Estás muy cerca de terminar! Solo un último esfuerzo.'}
                    </p>
                </div>

            </div>`;
    }
    return;
}

    if (l.type === 'pdf') {
        el.innerHTML = `
            <h1 class="lesson-title-main">${l.title}</h1>
            ${pdfCard(l.pdfUrl, 'Material de ejercicios', 'Descarga el plano y crea la pieza en SolidWorks')}`;
        return;
    }

    // video
let embed = null;

if (l.videoUrl && l.videoUrl.includes('drive.google.com')) {
    embed = l.videoUrl;
} else {
    embed = ytEmbed(l.videoUrl);
}

let html = `<h1 class="lesson-title-main">${l.title}</h1>`;
// ← Agrega esto:
if (l.desc) {
    html += `<p style="font-size:14px; color:var(--text-dim); line-height:1.8; margin-bottom:20px;">${l.desc}</p>`;
}
if (embed) {
    html += `
        <div class="video-wrap">
            <iframe src="${embed}" allowfullscreen></iframe>
        </div>
        <div class="hd-tip">
            <span>💡</span>
            <div>Para mejor calidad, reproduce el video en <strong>Full HD (1080p)</strong>. Haz clic en el ícono de configuración del video ⚙️ → Calidad → 1080p.</div>
        </div>
    `;
}

if (l.pdfUrl) {
    html += pdfCard(
        l.pdfUrl,
        'Plano de la pieza',
        'Descarga el PDF para seguir la práctica'
    );
}

// ── EXAMEN ──
if (l.type === 'exam') {
    el.innerHTML = `
        <h1 class="lesson-title-main">${l.title}</h1>
        <div class="pdf-card">
            <div class="pdf-icon-box">📝</div>
            <div class="pdf-card-info">
                <div class="pdf-card-title">Simulador de examen CSWA</div>
                <div class="pdf-card-sub">${l.dur} · Condiciones reales de examen</div>
            </div>
            <button class="btn-download" style="background:#f97316; border-color:#f97316;"
                onclick="window.open('${l.examUrl}','_blank')">
                Iniciar examen →
            </button>
        </div>`;
    return;
}

el.innerHTML = html;
}

function pdfCard(url, title, sub) {
    return `
        <div class="pdf-card">
            <div class="pdf-icon-box">📄</div>
            <div class="pdf-card-info">
                <div class="pdf-card-title">${title}</div>
                <div class="pdf-card-sub">${sub}</div>
            </div>
            <button class="btn-download" onclick="window.open('${url}','_blank')">
                ↓ Descargar PDF
            </button>
        </div>`;
}

// ── AUTO-COMPLETE (15 segundos) ─────────────────────────────
let autoCompleteTimer = null;

function startAutoComplete(idx) {
    clearTimeout(autoCompleteTimer);
    if (completed.has(idx)) return; // ya completada, no hacer nada
    autoCompleteTimer = setTimeout(() => {
        if (currentIdx === idx && !completed.has(idx)) {
            completed.add(idx);
            saveState();
            renderSidebar();
            updateProgress();
        }
    }, 15000);
}

// ── NAVIGATION ──────────────────────────────────────────────
function navigate(idx) {
    clearTimeout(autoCompleteTimer);
    currentIdx = idx;
    pushURL(idx);
    saveState();
    renderSidebar();
    renderContent();
    document.querySelector('.content-scroll').scrollTo(0, 0);
    startAutoComplete(idx);
}

function toggleDone(idx) {
    completed.has(idx) ? completed.delete(idx) : completed.add(idx);
    saveState();
    renderSidebar();
    updateProgress();
}

// ── MOBILE SIDEBAR ──────────────────────────────────────────
const sidebar  = document.getElementById('sidebar');
const overlay  = document.getElementById('overlay');
const menuBtn  = document.getElementById('menuToggle');

function closeSidebar() {
    sidebar.classList.remove('open');
    overlay.classList.remove('active');
}

menuBtn.addEventListener('click', () => {
    sidebar.classList.toggle('open');
    overlay.classList.toggle('active');
});

overlay.addEventListener('click', closeSidebar);

// ── BUTTONS ─────────────────────────────────────────────────
document.getElementById('btnPrev').addEventListener('click', () => {
    if (currentIdx > 0) navigate(currentIdx - 1);
});

document.getElementById('btnNext').addEventListener('click', () => {
    completed.add(currentIdx);
    if (currentIdx < lessons.length - 1) navigate(currentIdx + 1);
    saveState();
    updateProgress();
    renderSidebar();
});

window.addEventListener('popstate', e => {
    if (e.state?.idx !== undefined) {
        currentIdx = e.state.idx;
        renderSidebar();
        renderContent();
    }
});

function toggleTheme() {
    const isLight = document.body.classList.toggle('light');
    localStorage.setItem('sw_theme', isLight ? 'light' : 'dark');
    document.getElementById('btnTheme').textContent = isLight ? '🌙 Modo oscuro' : '☀️ Modo claro';
    document.getElementById('brandAccent').style.color = isLight ? '#1a4d8c' : 'orange';
}

// Restaurar tema al cargar
(function() {
    if (localStorage.getItem('sw_theme') === 'light') {
        document.body.classList.add('light');
        document.getElementById('btnTheme').textContent = '🌙 Modo oscuro';
        document.getElementById('brandAccent').style.color = '#1a4d8c';
    }
})();

// ── INIT ────────────────────────────────────────────────────
loadState();
const urlIdx = getLessonFromURL();
if (urlIdx !== null) currentIdx = urlIdx;
pushURL(currentIdx);
renderSidebar();
renderContent();
updateProgress();
startAutoComplete(currentIdx);
updateProgress();
</script>
