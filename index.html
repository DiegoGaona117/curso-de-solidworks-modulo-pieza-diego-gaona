/* ═══════════════════════════════════════════════════════
   CURSO DIEGO GAONA — css.css
   Stylesheet compartido entre páginas del curso
   ═══════════════════════════════════════════════════════ */

/* ── UTILIDAD COMPARTIDA: TIP HD ── */
.hd-tip {
    display: flex;
    align-items: center;
    gap: 10px;
    background: #f9731610;
    border: 1px solid #f9731630;
    border-radius: 8px;
    padding: 10px 16px;
    margin-bottom: 24px;
    font-size: 14px;
    color: var(--text-dim);
    line-height: 1.5;
}
.hd-tip span { font-size: 18px; flex-shrink: 0; }

/* ── RESET ── */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

/* ── VARIABLES (tema oscuro por defecto) ── */
:root {
    --bg:         #0d0f14;
    --surface:    #13161d;
    --surface2:   #1a1e28;
    --border:     #ffffff0f;
    --border2:    #ffffff2e;
    --accent:     #3b82f6;
    --accent-dim: #3b82f620;
    --orange:     #f97316;
    --text:       #e8eaf0;
    --text-muted: #ffffff;
    --text-dim:   #9ca3af;
    --green:      #10b981;
    --sidebar-w:  310px;
    --topbar-h:   58px;
}

html, body { height: 100%; overflow: hidden; }

body {
    font-family: 'Sora', sans-serif;
    background: var(--bg);
    /* FIX: eliminado "background-color: white" que sobreescribía el tema oscuro */
    color: var(--text);
    display: flex;
    flex-direction: column;
}

/* ── TOP BAR ── */
.topbar {
    height: var(--topbar-h);
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 20px;
    gap: 12px;
    flex-shrink: 0;
    z-index: 100;
}

.topbar-brand {
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
    letter-spacing: -0.02em;
    white-space: nowrap;
}
.topbar-brand span { color: var(--accent); }

.topbar-sep { flex: 1; }

.topbar-progress {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 12px;
    color: var(--text-muted);
}

.progress-bar {
    width: 120px;
    height: 15px;
    background: var(--border2);
    border-radius: 99px;
    overflow: hidden;
}
.progress-fill {
    height: 100%;
    background: var(--orange);
    border-radius: 99px;
    transition: width 0.4s ease;
}

.btn-nav {
    height: 34px;
    padding: 0 14px;
    border-radius: 7px;
    border: 1px solid var(--border2);
    background: transparent;
    color: var(--text);
    font-family: 'Sora', sans-serif;
    font-size: 13px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 6px;
    transition: all 0.15s;
    white-space: nowrap;
}
.btn-nav:hover    { background: var(--surface2); border-color: var(--border2); }
.btn-nav:disabled { opacity: 0.3; cursor: not-allowed; }

.btn-nav.primary {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
    font-weight: 500;
}
.btn-nav.primary:hover { background: #2563eb; border-color: #2563eb; }

/* Hamburger — oculto en desktop, aparece en media queries */
.menu-toggle {
    display: none;
    height: 34px;
    padding: 0 12px;
    border-radius: 7px;
    border: 1px solid var(--border2);
    background: transparent;
    color: var(--text-muted);
    font-size: 18px;
    cursor: pointer;
    align-items: center;
    justify-content: center;
}

/* ── LAYOUT ── */
.layout {
    flex: 1;
    display: flex;
    overflow: hidden;
}

/* ── SIDEBAR ── */
.sidebar {
    width: var(--sidebar-w);
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    flex-shrink: 0;
    transition: transform 0.25s ease;
}

.sidebar-scroll {
    flex: 1;
    overflow-y: auto;
    scrollbar-width: thin;
    scrollbar-color: var(--border2) transparent;
}
.sidebar-scroll::-webkit-scrollbar       { width: 4px; }
.sidebar-scroll::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 99px; }

.section-label {
    padding: 18px 16px 8px;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-dim);
}

.lesson-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 9px 16px;
    cursor: pointer;
    border-left: 2px solid transparent;
    transition: all 0.15s;
    user-select: none;
}
.lesson-item:hover  { background: var(--surface2); }
.lesson-item.active { background: var(--accent-dim); border-left-color: var(--accent); }

.lesson-check {
    width: 18px;
    height: 18px;
    border-radius: 50%;
    border: 2px solid var(--border2);
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    cursor: pointer;
}
.lesson-check.done { background: var(--green); border-color: var(--green); }
.lesson-check.done::after {
    content: '';
    width: 5px;
    height: 8px;
    border-right: 2px solid #fff;
    border-bottom: 2px solid #fff;
    transform: rotate(45deg) translate(-1px, -1px);
    display: block;
}

.lesson-meta { flex: 1; min-width: 0; }

.lesson-name {
    font-size: 14px;
    color: var(--text);
    line-height: 1.4;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}
.lesson-item.active .lesson-name { font-weight: 500; }

.lesson-dur {
    font-size: 11px;
    color: var(--text-muted);
    font-family: 'JetBrains Mono', monospace;
    margin-top: 2px;
}

.lesson-type-badge {
    font-size: 10px;
    padding: 2px 6px;
    border-radius: 4px;
    font-weight: 500;
    flex-shrink: 0;
}
.badge-pdf  { background: #7c3aed20; color: #a78bfa; }
.badge-free { background: #10b98120; color: #10b981; }
.lesson-lock { font-size: 11px; flex-shrink: 0; opacity: 0.5; }

/* ── MAIN CONTENT ── */
.main {
    flex: 1;
    min-width: 0;           /* FIX: sin esto, un flex item no se encoge más allá de su contenido */
    display: flex;
    flex-direction: column;
    overflow: hidden;
    background: var(--bg);
}

.content-scroll {
    flex: 1;
    overflow-x: hidden;     /* FIX: bloquea cualquier desbordamiento horizontal */
    overflow-y: auto;
    scrollbar-width: thin;
    scrollbar-color: var(--border2) transparent;
}
.content-scroll::-webkit-scrollbar       { width: 4px; }
.content-scroll::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 99px; }

.content-inner {
    width: 100%;            /* FIX: anclado al ancho real del padre */
    max-width: 1000px;
    margin: 0 auto;
    padding: 36px 32px 60px;
}

.lesson-title-main {
    font-size: 22px;
    font-weight: 600;
    letter-spacing: -0.03em;
    color: var(--text);
    margin-bottom: 20px;
    line-height: 1.3;
}

/* ── VIDEO ── */
/* FIX: "aspect-ratio" no funciona bien con iframes de Google Drive
   porque tienen dimensiones mínimas internas que ignoran el contenedor.
   El truco padding-bottom fuerza la proporción 16:9 desde afuera,
   haciendo que el iframe quede dentro sin importar su tamaño mínimo. */
.video-wrap {
    position: relative;
    width: 100%;
    max-width: 100%;        /* FIX: garantiza que nunca desborde su padre */
    padding-bottom: 56.25%; /* 16 / 9 = 0.5625 */
    height: 0;
    overflow: hidden;
    background: var(--surface);
    border-radius: 10px;
    margin-bottom: 16px;
    border: 1px solid var(--border);
}
.video-wrap iframe {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    border: none;
    display: block;
}

/* ── PDF CARD ── */
.pdf-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 28px 32px;
    display: flex;
    align-items: center;
    gap: 20px;
    margin-bottom: 20px;
}
.pdf-icon-box {
    width: 48px;
    height: 48px;
    background: #7c3aed20;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    flex-shrink: 0;
}
.pdf-card-info  { flex: 1; }
.pdf-card-title { font-size: 15px; font-weight: 600; color: var(--text); margin-bottom: 4px; }
.pdf-card-sub   { font-size: 13px; color: var(--text-muted); }

.btn-download {
    height: 36px;
    padding: 0 18px;
    background: #7c3aed;
    border: none;
    border-radius: 7px;
    color: #fff;
    font-family: 'Sora', sans-serif;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 6px;
    white-space: nowrap;
    transition: background 0.15s;
    flex-shrink: 0;
}
.btn-download:hover { background: #6d28d9; }

/* ── SECTION DIVIDER ── */
.section-divider { height: 1px; background: var(--border); margin: 24px 0; }

/* ── PAYWALL ── */
.paywall {
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    padding: 60px 24px 40px;
    max-width: 460px;
    margin: 0 auto;
}
.paywall-icon {
    font-size: 60px;
    margin-bottom: 20px;
    line-height: 1;
}
.paywall-title {
    font-size: 24px;
    font-weight: 600;
    color: var(--text);
    letter-spacing: -0.02em;
    margin-bottom: 12px;
    line-height: 1.3;
}
.paywall-sub {
    font-size: 15px;
    color: var(--text-dim);
    line-height: 1.7;
    margin-bottom: 36px;
}
.paywall-btn-buy {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    width: 100%;
    height: 54px;
    background: var(--orange);
    color: #fff;
    border-radius: 12px;
    font-family: 'Sora', sans-serif;
    font-size: 16px;
    font-weight: 600;
    text-decoration: none;
    margin-bottom: 16px;
    box-shadow: 0 4px 24px rgba(249,115,22,0.40);
    transition: background 0.15s, transform 0.1s;
}
.paywall-btn-buy:hover  { background: #ea6c10; transform: translateY(-1px); }
.paywall-btn-buy:active { transform: scale(0.98); }
.paywall-btn-login {
    font-size: 14px;
    color: var(--text-dim);
    text-decoration: none;
    transition: color 0.15s;
}
.paywall-btn-login:hover { color: var(--text); }

/* ── CONGRATS ── */
.congrats-wrap  { text-align: center; padding: 40px 20px; }
.congrats-emoji { font-size: 72px; margin-bottom: 24px; display: block; }
.congrats-title { font-size: 28px; font-weight: 600; letter-spacing: -0.03em; margin-bottom: 12px; }
.congrats-sub   { font-size: 16px; color: var(--text-dim); line-height: 1.7; max-width: 500px; margin: 0 auto; }

/* ── OVERLAY (fondo oscuro del drawer móvil) ── */
.overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: #00000080;
    z-index: 90;
}

/* ── BARRA DE NAVEGACIÓN MÓVIL (2 botones) ── */
/* Oculta en desktop. Se activa en ≤768px. */
.mobile-nav-bar  { display: none; }
.btn-float-prev  { display: none; }
.btn-float-next  { display: none; }

/* ── TOOLTIP DE DESCUBRIMIENTO DEL MENÚ ── */
.menu-hint {
    position: fixed;
    top: calc(var(--topbar-h) + 10px);
    left: 10px;
    right: 10px;
    background: var(--orange);
    color: #fff;
    font-family: 'Sora', sans-serif;
    font-size: 16px;
    font-weight: 600;
    padding: 14px 44px 14px 18px;
    border-radius: 10px;
    z-index: 200;
    pointer-events: auto;
    opacity: 0;
    transform: translateY(-4px);
    transition: opacity 0.35s, transform 0.35s;
    box-shadow: 0 4px 20px rgba(249, 115, 22, 0.45);
    line-height: 1.4;
}
.menu-hint::before {
    content: '';
    position: absolute;
    top: -6px;
    left: 20px;
    border-left: 6px solid transparent;
    border-right: 6px solid transparent;
    border-bottom: 6px solid var(--orange);
}
.menu-hint.visible {
    opacity: 1;
    transform: translateY(0);
}
.menu-hint-close {
    position: absolute;
    top: 50%;
    right: 12px;
    transform: translateY(-50%);
    background: none;
    border: none;
    color: #fff;
    font-size: 18px;
    cursor: pointer;
    padding: 4px 6px;
    line-height: 1;
    opacity: 0.8;
    -webkit-tap-highlight-color: transparent;
}
.menu-hint-close:hover { opacity: 1; }
@media (min-width: 1081px) {
    .menu-hint { display: none !important; }
}

/* ── TEMA CLARO ── */
body.light {
    --bg:         #f0f2f5;
    --surface:    #ffffff;
    --surface2:   #e8eaef;
    --border:     #0000000f;
    --border2:    #00000018;
    --text:       #1a1a2e;
    --text-muted: #333333;
    --text-dim:   #555555;
}

/* ══════════════════════════════════════════════════
   RESPONSIVE
   ══════════════════════════════════════════════════ */

/* ── TABLET (≤ 1080px) ──────────────────────────────
   Sidebar se convierte en drawer. Topbar compacto.   */
@media (max-width: 1080px) {
    .sidebar {
        position: fixed;
        left: 0; top: 0; bottom: 0;
        z-index: 95;
        transform: translateX(-100%);
    }
    .sidebar.open   { transform: translateX(0); }
    .overlay.active { display: block; }

    .menu-toggle     { display: flex; }
    .topbar-brand    { display: none; }
    .topbar          { padding: 0 12px; gap: 8px; }
    #btnPrev         { display: none; }
    #btnTheme        { display: none; }

    .topbar-progress { display: flex; }
    .progress-bar    { width: 80px; }

    #btnNext { font-size: 12px; padding: 0 10px; }
}

/* ── MÓVIL (≤ 768px) ────────────────────────────────
   FIX PRINCIPAL: antes se ocultaba TODA la página.
   Ahora se adapta con botón flotante de navegación.  */
@media (max-width: 768px) {
    :root { --sidebar-w: min(88vw, 320px); }

    /* Topbar compacto */
    .topbar       { padding: 0 10px; gap: 6px; }
    .progress-bar { width: 60px; height: 8px; }
    #progressText { font-size: 11px; }

    /* "Mis cursos" visible en móvil con texto completo */
    #btnMisCursos { display: flex; }
    #btnMisCursos .btn-label { display: inline; }

    /* Ocultar botón Next del topbar (reemplazado por el flotante) */
    #btnNext { display: none; }

    /* Padding inferior extra para no quedar debajo del botón flotante */
    .content-inner { padding: 18px 14px 100px; }

    .lesson-title-main { font-size: 18px; }

    /* PDF card en columna */
    .pdf-card {
        flex-direction: column;
        padding: 20px;
        gap: 12px;
        align-items: flex-start;
    }
    .btn-download {
        width: 100%;
        height: 44px;
        justify-content: center;
        font-size: 14px;
    }

    /* Congrats responsive */
    .congrats-emoji { font-size: 52px; }
    .congrats-title { font-size: 22px; }
    .congrats-sub   { font-size: 14px; }

    /* Items del sidebar más fáciles de tocar con el dedo */
    .lesson-item  { padding: 12px 16px; }
    .lesson-check { width: 22px; height: 22px; }
    .lesson-name  { font-size: 13px; }

    /* ── BARRA DE NAVEGACIÓN INFERIOR (2 botones) ── */
    .mobile-nav-bar {
        display: flex;
        position: fixed;
        bottom: 16px;
        left: 14px;
        right: 14px;
        gap: 10px;
        z-index: 50;
    }

    /* Botón "← Atrás" */
    .btn-float-prev {
        display: flex;
        flex: 0 0 68px;
        height: 52px;
        background: var(--surface2);
        border: 1px solid var(--border2);
        color: var(--text);
        border-radius: 14px;
        font-size: 20px;
        cursor: pointer;
        align-items: center;
        justify-content: center;
        transition: background 0.15s, transform 0.1s;
        -webkit-tap-highlight-color: transparent;
    }
    .btn-float-prev:disabled { opacity: 0.25; cursor: not-allowed; }
    .btn-float-prev:not(:disabled):active { background: var(--surface); transform: scale(0.97); }

    /* Botón "✓ Completar y continuar" */
    .btn-float-next {
        display: flex;
        flex: 1;
        height: 52px;
        background: var(--accent);
        color: #fff;
        border: none;
        border-radius: 14px;
        font-family: 'Sora', sans-serif;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        align-items: center;
        justify-content: center;
        gap: 6px;
        box-shadow: 0 4px 24px rgba(59, 130, 246, 0.40);
        transition: background 0.15s, transform 0.1s;
        -webkit-tap-highlight-color: transparent;
    }
    .btn-float-next:active { background: #2563eb; transform: scale(0.98); }
}

/* ── TELÉFONOS MUY PEQUEÑOS (≤ 380px) ── */
@media (max-width: 380px) {
    .topbar-progress  { display: none; }
    .content-inner    { padding: 14px 10px 100px; }
    .btn-float-next   { font-size: 13px; }
    .btn-float-prev   { flex: 0 0 56px; font-size: 18px; }
}

</style>
</head>

function getSessionEstado() {
    try {
        const raw = localStorage.getItem('dg_sesion');
        if (!raw) return null;
        const { estado, expira } = JSON.parse(raw);
        if (expira && Date.now() > expira) return null; // sesión expirada
        return estado || null;
    } catch {
        return null;
    }
}

    return getSessionEstado() === 'activo';

// ── STATE ────────────────────────────────────────────────────
let currentIdx = 0;
let completed = new Set();

function loadState() {
    try {
        const i = localStorage.getItem('pieza_idx');
        const c = localStorage.getItem('pieza_done');
        if (i) currentIdx = Math.min(parseInt(i), lessons.length - 1);
        if (c) completed = new Set(JSON.parse(c));
    } catch {}
}

function saveState() {
    try {
        localStorage.setItem('pieza_idx', currentIdx);
        localStorage.setItem('pieza_done', JSON.stringify([...completed]));
    } catch {}
}

function getLessonFromURL() {
    const id = new URLSearchParams(location.search).get('l');
    if (id !== null) {
        const idx = lessons.findIndex(l => l.id === parseInt(id));
        if (idx !== -1) return idx;
    }
    return null;
}

function pushURL(idx) {
    history.pushState({ idx }, '', `?l=${lessons[idx].id}`);
}

// ── YOUTUBE ──────────────────────────────────────────────────
function ytEmbed(url) {
    if (!url) return null;
    let id = null;
    if (url.includes('watch?v=')) id = url.split('watch?v=')[1].split('&')[0];
    else if (url.includes('youtu.be/')) id = url.split('youtu.be/')[1].split('?')[0];
    return id ? `https://www.youtube.com/embed/${id}?rel=0&modestbranding=1` : null;
}

// ── PROGRESS ─────────────────────────────────────────────────
function updateProgress() {
    const pct = Math.round((completed.size / lessons.length) * 100);
    document.getElementById('progressFill').style.width = pct + '%';
    document.getElementById('progressText').textContent = pct + '%';
}

// ── SIDEBAR ──────────────────────────────────────────────────
function renderSidebar() {
    const el = document.getElementById('sidebarScroll');
    el.innerHTML = '';
    let section = '';

    lessons.forEach((l, idx) => {
        if (l.section !== section) {
            section = l.section;
            const lbl = document.createElement('div');
            lbl.className = 'section-label';
            lbl.textContent = section;
            el.appendChild(lbl);
        }

        const item = document.createElement('div');
        item.className = 'lesson-item' + (idx === currentIdx ? ' active' : '');

        const check = document.createElement('div');
        check.className = 'lesson-check' + (completed.has(idx) ? ' done' : '');
        check.addEventListener('click', e => { e.stopPropagation(); toggleDone(idx); });

        const meta = document.createElement('div');
        meta.className = 'lesson-meta';
        meta.innerHTML = `<div class="lesson-name">${l.title}</div><div class="lesson-dur">${l.dur}</div>`;

        item.appendChild(check);
        item.appendChild(meta);

        if (l.type === 'pdf') {
            const badge = document.createElement('span');
            badge.className = 'lesson-type-badge badge-pdf';
            badge.textContent = 'PDF';
            item.appendChild(badge);
        }

        if (isLessonFree(l)) {
            const badge = document.createElement('span');
            badge.className = 'lesson-type-badge badge-free';
            badge.textContent = 'GRATIS';
            item.appendChild(badge);
        } else if (!sesionValida()) {
            const lock = document.createElement('span');
            lock.className = 'lesson-lock';
            lock.textContent = '🔒';
            item.appendChild(lock);
        }

        item.addEventListener('click', () => { navigate(idx); closeSidebar(); });
        el.appendChild(item);
    });

    const active = el.querySelector('.lesson-item.active');
    if (active) active.scrollIntoView({ block: 'nearest' });
}

    return `
        <div class="pdf-card">
            <div class="pdf-icon-box">📄</div>
            <div class="pdf-card-info">
                <div class="pdf-card-title">${title}</div>
                <div class="pdf-card-sub">${sub}</div>
            </div>
            <button class="btn-download" onclick="window.open('${url}','_blank')">
                ↓ Descargar PDF
            </button>
        </div>`;
}

// ── CONTENT ──────────────────────────────────────────────────
function renderContent() {
    const el = document.getElementById('contentInner');
    const l = lessons[currentIdx];

    document.getElementById('btnPrev').disabled = currentIdx === 0;

    // ── VERIFICAR SESIÓN ──
    // Sin sesión activa → mostrar paywall, excepto en lecciones gratuitas
    if (!sesionValida() && !isLessonFree(l)) {
        renderPaywall(el);
        return;
    }

    // ── CONGRATS ──
    if (l.type === 'congrats') {
        const total = lessons.length - 1;
        const done = completed.size;
        const pct = Math.round((done / total) * 100);
        const remaining = total - done;
        const isComplete = pct >= 100;

        if (isComplete) {
            el.innerHTML = `
                <div class="congrats-wrap">
                    <span class="congrats-emoji">🎓</span>
                    <h1 class="congrats-title">¡Curso completado!</h1>
                    <p class="congrats-sub">Has terminado todo el contenido. Ahora tienes las bases sólidas para diseñar en SolidWorks de forma profesional. ¡Excelente trabajo!</p>
                    <div class="section-divider" style="max-width:200px;margin:32px auto;"></div>
                    <p style="font-size:14px;color:var(--text-muted);">— Diego Gaona</p>
                </div>`;
        } else {
            el.innerHTML = `
                <div style="max-width:560px; margin:0 auto; padding:20px 0;">
                    <h1 class="lesson-title-main" style="margin-bottom:6px;">Tu progreso</h1>
                    <p style="font-size:14px; color:var(--text-dim); margin-bottom:32px;">
                        Completa todas las lecciones para desbloquear esta pantalla.
                    </p>
                    <div style="text-align:center; margin-bottom:28px;">
                        <span style="font-size:72px; font-weight:600; letter-spacing:-0.04em; color:var(--text);">${pct}<span style="font-size:36px; color:var(--text-dim);">%</span></span>
                        <p style="font-size:13px; color:var(--text-dim); margin-top:4px;">completado</p>
                    </div>
                    <div style="height:8px; background:var(--surface2); border-radius:99px; overflow:hidden; margin-bottom:32px;">
                        <div style="height:100%; width:${pct}%; background:var(--orange); border-radius:99px; transition:width 0.6s ease;"></div>
                    </div>
                    <div style="display:grid; grid-template-columns:1fr 1fr 1fr; gap:12px; margin-bottom:36px;">
                        <div style="background:var(--surface); border:1px solid var(--border2); border-radius:10px; padding:16px; text-align:center;">
                            <div style="font-size:22px; font-weight:600; color:var(--green); margin-bottom:4px;">${done}</div>
                            <div style="font-size:11px; color:var(--text-dim); text-transform:uppercase; letter-spacing:0.06em;">Completadas</div>
                        </div>
                        <div style="background:var(--surface); border:1px solid var(--border2); border-radius:10px; padding:16px; text-align:center;">
                            <div style="font-size:22px; font-weight:600; color:var(--orange); margin-bottom:4px;">${remaining}</div>
                            <div style="font-size:11px; color:var(--text-dim); text-transform:uppercase; letter-spacing:0.06em;">Pendientes</div>
                        </div>
                        <div style="background:var(--surface); border:1px solid var(--border2); border-radius:10px; padding:16px; text-align:center;">
                            <div style="font-size:22px; font-weight:600; color:var(--text); margin-bottom:4px;">${total}</div>
                            <div style="font-size:11px; color:var(--text-dim); text-transform:uppercase; letter-spacing:0.06em;">Total</div>
                        </div>
                    </div>
                    <div style="background:var(--surface); border:1px solid var(--border); border-left:3px solid var(--orange); border-radius:8px; padding:16px 20px;">
                        <p style="font-size:13px; color:var(--text-dim); line-height:1.7; margin:0;">
                            ${pct < 25  ? '¡Buen comienzo! Sigue avanzando lección por lección.' :
                              pct < 50  ? '¡Ya vas por la primera mitad! Mantén el ritmo.' :
                              pct < 75  ? '¡Más de la mitad completado! Ya casi llegas.' :
                                          '¡Estás muy cerca de terminar! Solo un último esfuerzo.'}
                        </p>
                    </div>
                </div>`;
        }
        return;
    }

    // ── PDF ──
    if (l.type === 'pdf') {
        el.innerHTML = `
            <h1 class="lesson-title-main">${l.title}</h1>
            ${pdfCard(l.pdfUrl, 'Material de ejercicios', 'Descarga el plano y crea la pieza en SolidWorks')}`;
        return;
    }

    // ── EXAMEN ──
    // FIX: movido aquí antes del bloque de video para evitar doble escritura en el.innerHTML
    if (l.type === 'exam') {
        el.innerHTML = `
            <h1 class="lesson-title-main">${l.title}</h1>
            <div class="pdf-card">
                <div class="pdf-icon-box">📝</div>
                <div class="pdf-card-info">
                    <div class="pdf-card-title">Simulador de examen CSWA</div>
                    <div class="pdf-card-sub">${l.dur} · Condiciones reales de examen</div>
                </div>
                <button class="btn-download" style="background:#f97316; border-color:#f97316;"
                    onclick="window.open('${l.examUrl}','_blank')">
                    Iniciar examen →
                </button>
            </div>`;
        return;
    }

    // ── VIDEO ──
    let embed = null;
    if (l.videoUrl && l.videoUrl.includes('drive.google.com')) {
        embed = l.videoUrl;
    } else {
        embed = ytEmbed(l.videoUrl);
    }

    let html = `<h1 class="lesson-title-main">${l.title}</h1>`;

    if (l.desc) {
        html += `<p style="font-size:14px; color:var(--text-dim); line-height:1.8; margin-bottom:20px;">${l.desc}</p>`;
    }

    if (embed) {
        html += `
            <div class="video-wrap">
                <iframe src="${embed}" allowfullscreen></iframe>
            </div>
            <div class="hd-tip">
                <span>💡</span>
                <div>Para mejor calidad, reproduce el video en <strong>Full HD (1080p)</strong>. Haz clic en el ícono de configuración del video ⚙️ → Calidad → 1080p.</div>
            </div>`;
    }

    if (l.pdfUrl) {
        html += pdfCard(l.pdfUrl, 'Plano de la pieza', 'Descarga el PDF para seguir la práctica');
    }

    el.innerHTML = html;

    // Escalar el video si el contenedor es más angosto que el mínimo del iframe
    requestAnimationFrame(applyVideoScale);
}

// ── ESCALA DE VIDEO PARA MÓVIL ───────────────────────────────
// Google Drive embeds no se renderizan a menos de ~560px internamente.
// Solución: dejar que el iframe renderice a 560px y escalarlo hacia abajo
// con transform:scale() para que quepa en pantallas más angostas.
const VIDEO_MIN_W = 560;

function applyVideoScale() {
    const wrap = document.querySelector('.video-wrap');
    if (!wrap) return;
    const iframe = wrap.querySelector('iframe');
    if (!iframe) return;

    const containerW = wrap.offsetWidth;

    if (containerW < VIDEO_MIN_W) {
        const scale = containerW / VIDEO_MIN_W;
        // El iframe se renderiza a su mínimo real y se encoge visualmente
        iframe.style.width          = VIDEO_MIN_W + 'px';
        iframe.style.height         = (VIDEO_MIN_W * 9 / 16) + 'px';
        iframe.style.transform      = `scale(${scale})`;
        iframe.style.transformOrigin = 'top left';
    } else {
        // Desktop/tablet: comportamiento normal
        iframe.style.width          = '100%';
        iframe.style.height         = '100%';
        iframe.style.transform      = '';
        iframe.style.transformOrigin = '';
    }
}

// Re-aplicar al cambiar el tamaño de ventana (rotación, resize)
window.addEventListener('resize', applyVideoScale);

// ── AUTO-COMPLETE ─────────────────────────────────────────────
// FIX: solo aplica auto-complete a PDFs (3 seg). Los videos no se auto-completan
// porque el usuario puede pausar y sería marcado como visto sin verlo
let autoCompleteTimer = null;

function startAutoComplete(idx) {
    clearTimeout(autoCompleteTimer);
    if (completed.has(idx)) return;
    if (lessons[idx].type === 'pdf') {
        autoCompleteTimer = setTimeout(() => {
            if (currentIdx === idx && !completed.has(idx)) {
                completed.add(idx);
                saveState();
                renderSidebar();
                updateProgress();
            }
        }, 3000);
    }
}

// ── NAVIGATION ───────────────────────────────────────────────
function navigate(idx) {
    clearTimeout(autoCompleteTimer);
    currentIdx = idx;
    pushURL(idx);
    saveState();
    renderSidebar();
    renderContent();
    updateMobileNav();
    document.querySelector('.content-scroll').scrollTo(0, 0);
    startAutoComplete(idx);
}

function toggleDone(idx) {
    completed.has(idx) ? completed.delete(idx) : completed.add(idx);
    saveState();
    renderSidebar();
    updateProgress();
}

// ── MOBILE SIDEBAR ───────────────────────────────────────────
const sidebar = document.getElementById('sidebar');
const overlay = document.getElementById('overlay');
const menuBtn = document.getElementById('menuToggle');

function closeSidebar() {
    sidebar.classList.remove('open');
    overlay.classList.remove('active');
}

menuBtn.addEventListener('click', () => {
    sidebar.classList.toggle('open');
    overlay.classList.toggle('active');
});

overlay.addEventListener('click', closeSidebar);

// ── BOTONES ──────────────────────────────────────────────────
document.getElementById('btnPrev').addEventListener('click', () => {
    if (currentIdx > 0) navigate(currentIdx - 1);
});

// FIX: eliminadas las llamadas redundantes a saveState/updateProgress/renderSidebar
// ya que navigate() las ejecuta internamente
document.getElementById('btnNext').addEventListener('click', () => {
    completed.add(currentIdx);
    saveState();
    if (currentIdx < lessons.length - 1) {
        navigate(currentIdx + 1);
    } else {
        updateProgress();
        renderSidebar();
    }
});

window.addEventListener('popstate', e => {
    if (e.state?.idx !== undefined) {
        currentIdx = e.state.idx;
        renderSidebar();
        renderContent();
    }
});

// ── TEMA ─────────────────────────────────────────────────────
function toggleTheme() {
    const isLight = document.body.classList.toggle('light');
    localStorage.setItem('sw_theme', isLight ? 'light' : 'dark');
    document.getElementById('btnTheme').textContent = isLight ? '🌙 Modo oscuro' : '☀️ Modo claro';
    document.getElementById('brandAccent').style.color = isLight ? '#1a4d8c' : 'orange';
}

(function() {
    if (localStorage.getItem('sw_theme') === 'light') {
        document.body.classList.add('light');
        document.getElementById('btnTheme').textContent = '🌙 Modo oscuro';
        document.getElementById('brandAccent').style.color = '#1a4d8c';
    }
})();

// ── INIT ─────────────────────────────────────────────────────
loadState();
const urlIdx = getLessonFromURL();
if (urlIdx !== null) currentIdx = urlIdx;
pushURL(currentIdx);
renderSidebar();
renderContent();
updateProgress();
startAutoComplete(currentIdx);

// ── BARRA DE NAVEGACIÓN MÓVIL ────────────────────────────────

// Sincroniza el estado del botón "← Atrás" flotante
function updateMobileNav() {
    const prev = document.getElementById('btnFloatPrev');
    if (prev) prev.disabled = currentIdx === 0;
}
updateMobileNav();

// Botón "← Atrás"
document.getElementById('btnFloatPrev').addEventListener('click', () => {
    if (currentIdx > 0) navigate(currentIdx - 1);
});

// Botón "✓ Completar y continuar"
document.getElementById('btnFloatNext').addEventListener('click', () => {
    completed.add(currentIdx);
    saveState();
    if (currentIdx < lessons.length - 1) {
        navigate(currentIdx + 1);
    } else {
        updateProgress();
        renderSidebar();
    }
});

// ── TOOLTIP DE DESCUBRIMIENTO DEL MENÚ ──────────────────────
// Aparece una sola vez. El usuario lo cierra con la ✕.
(function() {
    if (localStorage.getItem('sw_hint_seen')) return;
    if (window.innerWidth > 1080) return;

    const hint = document.getElementById('menuHint');
    if (!hint) return;

    function closeHint() {
        hint.classList.remove('visible');
        localStorage.setItem('sw_hint_seen', '1');
    }

    // Aparece después de 1.2s
    setTimeout(() => hint.classList.add('visible'), 1200);

    // Cerrar con la X
    document.getElementById('menuHintClose').addEventListener('click', closeHint);

    // También cerrar si toca el ☰
    document.getElementById('menuToggle').addEventListener('click', closeHint);
})();

</script>
